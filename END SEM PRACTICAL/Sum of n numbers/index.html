<!DOCTYPE html>
<html>
<head>
    <title>Sum of N Numbers</title>
</head>
<body>
    <h2>Sum of N Numbers</h2>

    <label>Enter a number (N): </label>
    <input type="number" id="num">
    <button onclick="findSum()">Calculate</button>

    <h3 id="result"></h3>

    <script>
        function findSum() {
            let n = parseInt(document.getElementById("num").value);
            let sum = 0;

            for (let i = 1; i <= n; i++) {
                sum += i;
            }

            document.getElementById("result").innerHTML =
                "Sum of numbers from 1 to " + n + " is " + sum;
        }
    </script>
</body>
</html>
